name: plant_id
description: "Plant identification app using AI vision"
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # HTTP client
  dio: ^5.7.0

  # Image picking
  image_picker: ^1.1.0

  # Data models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Environment variables
  flutter_dotenv: ^5.2.0

  # Local storage & history
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  uuid: ^4.5.0

  # App info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#27AE60"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
